<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat UI – Modern Social</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="chat-app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Chats</h2>

    <div class="user active">
      <img src="https://i.pravatar.cc/150?img=32">
      <div>
        <h4>Alice</h4>
        <p>Typing...</p>
      </div>
      <span class="online"></span>
    </div>

    <div class="user">
      <img src="https://i.pravatar.cc/150?img=12">
      <div>
        <h4>John</h4>
        <p>See you tomorrow</p>
      </div>
    </div>

    <div class="user">
      <img src="https://i.pravatar.cc/150?img=45">
      <div>
        <h4>Emma</h4>
        <p>Thanks ❤️</p>
      </div>
    </div>

  </aside>

  <!-- CHAT AREA -->
  <section class="chat">

    <!-- HEADER -->
    <header class="chat-header">
      <div class="profile">
        <img src="https://i.pravatar.cc/150?img=32">
        <div>
          <h3>Alice</h3>
          <span>Online</span>
        </div>
      </div>
    </header>

    <!-- MESSAGES -->
    <div class="messages">

      <div class="message received">
        Hey Arun! 👋 How’s your project going?
      </div>

      <div class="message sent">
        It's going great! The UI looks amazing 😍
      </div>

      <div class="message received">
        Awesome! Send me the final design later 🚀
      </div>

      <div class="message sent">
        Sure, will do today 👍
      </div>

    </div>

    <!-- INPUT -->
    <footer class="chat-input">
      <input type="text" placeholder="Type a message...">
      <button>➤</button>
    </footer>

  </section>

</div>

</body>
</html>
